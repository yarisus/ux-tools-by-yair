<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <style>
      .title { font-family: Montserrat, Poppins, 'Segoe UI', Arial, sans-serif; font-weight: 800; fill: #0F172A; }
